name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --python ${{ matrix.python-version }} --extra dev

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        uv run --python ${{ matrix.python-version }} flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        uv run --python ${{ matrix.python-version }} flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run import smoke checks
      run: |
        uv run --python ${{ matrix.python-version }} python -m compileall src tests dashboard
        uv run --python ${{ matrix.python-version }} python -c "import src.server, src.cli, src.ai_engine, src.performance; print('imports ok')"
    
    - name: Run tests with pytest
      env:
        DEMO_MODE: true
        OPENAI_API_KEY: test_key
        AI_OPENAI_MODEL: gpt-5.4
      run: |
        uv run --python ${{ matrix.python-version }} pytest -v --cov=src --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Run Bandit Security Scan
      run: |
        uv tool run --from 'bandit[toml]' bandit -r src -f screen -lll

    - name: Run Safety Check
      run: |
        uv tool run --from safety safety check --json || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t marketing-automation-mcp:latest .
    
    - name: Run Docker smoke checks
      run: |
        docker run --rm -e DEMO_MODE=true marketing-automation-mcp:latest python3 -m compileall src tests dashboard
        docker run --rm -e DEMO_MODE=true marketing-automation-mcp:latest python3 -c "import src.server, src.cli, src.ai_engine; print('container imports ok')"
